x-nullclaw-build: &nullclaw-build
  context: .
  dockerfile: Dockerfile
  target: ${NULLCLAW_DOCKER_TARGET:-release}
  args:
    ZIG_VERSION: "0.16.0"
    VERSION: ${NULLCLAW_VERSION:-dev}

services:
  agent:
    image: ${NULLCLAW_IMAGE:-nullclaw:local}
    build: *nullclaw-build
    profiles: ["agent"]
    stdin_open: true
    tty: true
    command: ["agent"]
    env_file:
      - path: .env
        required: false
    volumes:
      - nullclaw-data:/nullclaw-data
    restart: unless-stopped

  gateway:
    image: ${NULLCLAW_IMAGE:-nullclaw:local}
    build: *nullclaw-build
    profiles: ["gateway"]
    command: ["gateway", "--port", "3000", "--host", "::"]
    ports:
      - "127.0.0.1:${NULLCLAW_GATEWAY_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    volumes:
      - nullclaw-data:/nullclaw-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nullclaw-data:
